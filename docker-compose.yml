services:
  backend:
    build: ./backend
    container_name: drop-backend
    ports:
      - "4000:4000"
    restart: unless-stopped

  guardian-ui:
    build: ./guardian-ui
    container_name: guardian-ui
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped

  phone-pwa:
    build: ./phone-pwa
    container_name: phone-pwa
    ports:
      - "5174:5174"
    depends_on:
      - backend
    restart: unless-stopped