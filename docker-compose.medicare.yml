# Medicare-only Docker Compose
# Usage: docker compose -f docker-compose.medicare.yml up --build
#
# Spins up only the Medicare microservice + Guardian UI frontend.
# The medicare-service is a lightweight backend that only handles
# medicine CRUD and authentication — no GPS, alerts, or WebSocket.

services:
  medicare-backend:
    build: ./medicare-service
    container_name: medicare-backend
    ports:
      - "4001:4001"
    environment:
      - PORT=4001
    networks:
      - medicare-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4001/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  medicare-ui:
    build: ./guardian-ui
    container_name: medicare-ui
    ports:
      - "5175:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:4001
      - VITE_WS_BASE_URL=ws://localhost:4001
    depends_on:
      medicare-backend:
        condition: service_healthy
    networks:
      - medicare-net
    restart: unless-stopped

networks:
  medicare-net:
    driver: bridge
